services:
  rustpad:
    image: ubermetroid/rustpad:latest
    build: .
    container_name: rustpad
    restart: unless-stopped
    ports:
      - ${PORT:-4402}:4402
    volumes:
      - ${RUSTPAD_DATA_PATH:-./data}:/app/data
    environment:
      PORT: 4402
      SITE_TITLE: ${SITE_TITLE:-RustPad}
      RUSTPAD_PIN: ${RUSTPAD_PIN:-}
      BASE_URL: ${BASE_URL:-http://localhost:4402}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      TZ: ${TZ:-UTC}
      ENABLE_TRANSLATION: ${ENABLE_TRANSLATION:-false}
      MAX_ATTEMPTS: ${MAX_ATTEMPTS:-5}