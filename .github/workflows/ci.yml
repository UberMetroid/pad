name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check-format:
    name: Code Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Stable Rust
        run: rustup update stable && rustup component add rustfmt
      - name: Check Formatting
        run: cargo fmt --all --check

  clippy-and-build:
    name: Lint & Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Stable Rust & WASM Target
        run: |
          rustup update stable
          rustup target add wasm32-unknown-unknown
          rustup component add clippy
      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run Tests
        run: cargo test --workspace
      - name: Build WASM Frontend Target
        run: cargo build --manifest-path frontend/Cargo.toml --target wasm32-unknown-unknown --release
      - name: Build Backend Release Binary
        run: cargo build --release
